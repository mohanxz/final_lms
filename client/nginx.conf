server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Serve service worker and manifest with correct MIME types
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|otf)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public";
  }

  location ~* \.(json|webmanifest)$ {
    add_header Content-Type application/manifest+json;
    try_files $uri =404;
  }

  # Optional: Gzip compression
  gzip on;
  gzip_types text/plain application/javascript application/x-javascript text/javascript text/css application/json;
  gzip_min_length 256;
}
